<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Sorter!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #74b9ff 0%, #a8d8f0 52%, #55efc4 52%, #00b894 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.65;
            pointer-events: none;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .c1 {
            width: 130px;
            height: 42px;
            top: 30px;
            left: -150px;
            animation: drift 22s linear infinite;
        }

        .c1::before {
            width: 65px;
            height: 65px;
            top: -32px;
            left: 18px;
        }

        .c1::after {
            width: 45px;
            height: 45px;
            top: -22px;
            left: 72px;
        }

        .c2 {
            width: 95px;
            height: 32px;
            top: 75px;
            left: -120px;
            animation: drift 32s linear infinite 8s;
        }

        .c2::before {
            width: 52px;
            height: 52px;
            top: -26px;
            left: 12px;
        }

        .c2::after {
            width: 34px;
            height: 34px;
            top: -17px;
            left: 52px;
        }

        .c3 {
            width: 160px;
            height: 52px;
            top: 15px;
            left: -200px;
            animation: drift 27s linear infinite 14s;
        }

        .c3::before {
            width: 75px;
            height: 75px;
            top: -38px;
            left: 22px;
        }

        .c3::after {
            width: 54px;
            height: 54px;
            top: -27px;
            left: 88px;
        }

        @keyframes drift {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(115vw);
            }
        }

        /* Header */
        header {
            z-index: 10;
            text-align: center;
            padding: 18px 20px 10px;
            width: 100%;
        }

        h1 {
            font-size: 2.4rem;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
        }

        #hud {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.93);
            border-radius: 30px;
            padding: 8px 22px;
            margin-top: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            color: #2d3436;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        #hud .divider {
            color: #b2bec3;
        }

        #prog-wrap {
            width: 290px;
            height: 10px;
            background: rgba(255, 255, 255, 0.38);
            border-radius: 10px;
            margin: 10px auto 0;
            overflow: hidden;
        }

        #prog-fill {
            height: 100%;
            background: linear-gradient(90deg, #fdcb6e, #e17055);
            border-radius: 10px;
            width: 0%;
            transition: width 0.55s cubic-bezier(.4, 0, .2, 1);
        }

        /* Game area */
        #game-area {
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            gap: 10px;
        }

        #hint-text {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
        }

        #trash-card {
            background: white;
            border-radius: 28px;
            padding: 28px 52px;
            text-align: center;
            cursor: grab;
            touch-action: none;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.18);
            animation: card-float 3s ease-in-out infinite;
        }

        #trash-card.grabbing {
            cursor: grabbing;
            animation: none;
        }

        @keyframes card-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes card-in {
            from {
                transform: scale(0.55) rotate(-8deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes card-shake {

            0%,
            100% {
                transform: translateX(0);
            }

            18% {
                transform: translateX(-14px) rotate(-3deg);
            }

            36% {
                transform: translateX(14px) rotate(3deg);
            }

            54% {
                transform: translateX(-9px);
            }

            72% {
                transform: translateX(9px);
            }
        }

        #trash-emoji {
            font-size: 96px;
            line-height: 1;
            display: block;
            pointer-events: none;
        }

        #trash-label {
            font-size: 1.45rem;
            font-weight: 800;
            color: #2d3436;
            margin-top: 10px;
            pointer-events: none;
        }

        /* Bins */
        #bins-row {
            z-index: 10;
            display: flex;
            gap: 18px;
            padding: 14px 16px 22px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .bin {
            width: 178px;
            padding: 24px 14px;
            border-radius: 26px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
            border: 5px solid transparent;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .bin[data-bin="compost"] {
            background: linear-gradient(145deg, #d4edda, #a8d5b0);
        }

        .bin[data-bin="recycle"] {
            background: linear-gradient(145deg, #cce5ff, #93c5fd);
        }

        .bin[data-bin="trash"] {
            background: linear-gradient(145deg, #fde8ea, #fca5ab);
        }

        .bin.over {
            transform: scale(1.12) translateY(-8px);
            border-color: #fdcb6e;
            box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
        }

        .bin-icon {
            font-size: 68px;
            display: block;
            line-height: 1;
        }

        .bin-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: #2d3436;
            margin-top: 8px;
        }

        .bin-sub {
            font-size: 0.8rem;
            color: #636e72;
            margin-top: 4px;
        }

        /* Ghost for touch drag */
        #ghost {
            position: fixed;
            font-size: 82px;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            display: none;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
            transition: none;
        }

        /* Toast feedback */
        #toast {
            position: fixed;
            left: 50%;
            top: 38%;
            transform: translateX(-50%) scale(0.6);
            background: #00b894;
            color: white;
            padding: 16px 28px;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
            max-width: 330px;
            width: 88vw;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            transition: opacity 0.22s, transform 0.22s;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        #toast.show.wrong {
            background: #d63031;
        }

        /* Confetti */
        .conf {
            position: fixed;
            pointer-events: none;
            z-index: 800;
            border-radius: 3px;
            animation: conffall linear forwards;
        }

        @keyframes conffall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* End screen */
        #end-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            z-index: 600;
            align-items: center;
            justify-content: center;
        }

        #end-screen.active {
            display: flex;
        }

        #end-card {
            background: white;
            border-radius: 30px;
            padding: 38px 50px 44px;
            text-align: center;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
            animation: pop 0.45s cubic-bezier(.175, .885, .32, 1.275);
            max-width: 380px;
            width: 90vw;
        }

        @keyframes pop {
            from {
                transform: scale(0.3);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #end-trophy {
            font-size: 76px;
            line-height: 1;
        }

        #end-card h2 {
            font-size: 2rem;
            margin: 12px 0 4px;
            color: #2d3436;
        }

        #end-score {
            font-size: 2.6rem;
            font-weight: 900;
            color: #e17055;
        }

        #end-msg {
            font-size: 1.1rem;
            color: #636e72;
            margin: 10px 0 26px;
            line-height: 1.4;
        }

        .play-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.15rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 184, 148, 0.45);
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .play-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 10px 26px rgba(0, 184, 148, 0.55);
        }

        /* === Nature Decorations === */
        #decorations {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .tree {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(2px 6px 8px rgba(0, 0, 0, 0.18));
        }

        .pine-layer {
            width: 0;
            height: 0;
            border-left-style: solid;
            border-right-style: solid;
            border-bottom-style: solid;
            border-left-color: transparent;
            border-right-color: transparent;
            display: block;
        }

        .blob-canopy {
            border-radius: 50% 55% 48% 52% / 55% 48% 52% 50%;
            background: radial-gradient(circle at 36% 30%, #95d5b2, #2d6a4f 80%);
        }

        .trunk {
            background: linear-gradient(to right, #6d4c41, #8d6e63, #6d4c41);
            border-radius: 3px 3px 0 0;
            margin: 0 auto;
        }

        .pond {
            position: absolute;
            background: radial-gradient(ellipse at 38% 38%, #ade8f4 0%, #48cae4 45%, #0096c7 100%);
            border-radius: 50%;
            box-shadow: inset 0 4px 14px rgba(0, 80, 160, 0.2), 0 3px 10px rgba(0, 0, 0, 0.14);
        }

        /* ripple ring on pond */
        .pond::after {
            content: '';
            position: absolute;
            inset: 15% 20%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.35);
        }

        .duck {
            position: absolute;
            font-size: 22px;
        }

        .flower {
            position: absolute;
            transform-origin: bottom center;
        }

        @keyframes duck-bob {

            0%,
            100% {
                transform: translateY(0) rotate(-4deg);
            }

            50% {
                transform: translateY(-6px) rotate(4deg);
            }
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-8deg);
            }

            50% {
                transform: rotate(8deg);
            }
        }

        @keyframes pond-ripple {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.1;
                transform: scale(1.15);
            }
        }

        /* === Responsive tweaks === */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            #trash-emoji {
                font-size: 78px;
            }

            #trash-card {
                padding: 22px 36px;
            }

            .bin {
                width: 140px;
                padding: 18px 10px;
            }

            .bin-icon {
                font-size: 54px;
            }

            .bin-name {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div id="decorations">

        <!-- ── LEFT: large pine tree ── -->
        <div class="tree" style="left:0%;bottom:10%">
            <div class="pine-layer"
                style="border-left-width:22px;border-right-width:22px;border-bottom-width:38px;border-bottom-color:#1b4332">

            <div class="pine-layer"
                style="border-left-width:30px;border-right-width:30px;border-bottom-width:50px;border-bottom-color:#2d6a4f;margin-top:-20px">

        <!-- ── LEFT: small round tree ── -->
        <div class="tree" style="left:10%;bottom:8%">

        <!-- ── LEFT: tiny bush ── -->
        <div class="tree" style="left:18%;bottom:7%">
            <div class="blob-canopy"
                style="width:42px;height:38px;background:radial-gradient(circle at 40% 35%,#b7e4c7,#40916c 85%)"></div>
            <div class="trunk" style="width:8px;height:12px"></div>
        </div>

        <!-- ── RIGHT: large pine tree ── -->
        <div class="tree" style="right:0%;bottom:10%">
            <div class="pine-layer"
                style="border-left-width:22px;border-right-width:22px;border-bottom-width:38px;border-bottom-color:#1b4332">
            </div>
            <div class="pine-layer"
                style="border-left-width:30px;border-right-width:30px;border-bottom-width:50px;border-bottom-color:#2d6a4f;margin-top:-20px">
            </div>
            <div class="pine-layer"
                style="border-left-width:40px;border-right-width:40px;border-bottom-width:62px;border-bottom-color:#40916c;margin-top:-26px">
            </div>
            <div class="trunk" style="width:13px;height:30px"></div>
        </div>

        <!-- ── RIGHT: medium round tree ── -->
        <div class="tree" style="right:10%;bottom:8%">
            <div class="blob-canopy" style="width:70px;height:74px"></div>
            <div class="trunk" style="width:12px;height:26px"></div>
        </div>

        <!-- ── RIGHT: tiny bush ── -->
        <div class="tree" style="right:19%;bottom:7%">
            <div class="blob-canopy"
                style="width:38px;height:36px;background:radial-gradient(circle at 40% 35%,#b7e4c7,#40916c 85%)"></div>
            <div class="trunk" style="width:8px;height:12px"></div>
        </div>

        <!-- ── POND (bottom-left) ── -->
        <div class="pond" style="left:3%;bottom:2%;width:120px;height:62px"></div>

        <!-- ── DUCKS ── -->
        <span class="duck" style="left:3%;bottom:9%;animation:duck-bob 2.2s ease-in-out infinite">🦆</span>
        <span class="duck"
            style="left:9%;bottom:7.5%;font-size:18px;animation:duck-bob 2.8s ease-in-out infinite 0.7s">🦆</span>

        <!-- ── FLOWERS & PLANTS (scattered) ── -->
        <span class="flower"
            style="left:21%;bottom:14%;font-size:20px;animation:sway 3.4s ease-in-out infinite">🌸</span>
        <span class="flower"
            style="left:23%;bottom:16%;font-size:15px;animation:sway 4.1s ease-in-out infinite 0.5s">🌿</span>
        <span class="flower"
            style="right:21%;bottom:14%;font-size:20px;animation:sway 3.1s ease-in-out infinite 0.3s">🌼</span>
        <span class="flower"
            style="right:23%;bottom:16%;font-size:16px;animation:sway 3.8s ease-in-out infinite 0.9s">🌻</span>
        <span class="flower"
            style="left:50%;bottom:7%;font-size:16px;animation:sway 3.6s ease-in-out infinite 0.2s;transform:translateX(-50%)">🌾</span>

    </div>

    <header>
        <h1>♻️ Trash Sorter!</h1>
        <div id="hud">
            ⭐ <span id="score-val">0</span> correct
            <span class="divider">|</span>
            <span id="left-val">20</span> left
        </div>
        <div id="prog-wrap">
            <div id="prog-fill"></div>
        </div>
    </header>

    <div id="game-area">
        <div id="hint-text">🖱️ Drag the trash to the right bin!</div>
        <div id="trash-card" draggable="true">
            <span id="trash-emoji">🍎</span>
            <div id="trash-label">Apple Core</div>
        </div>
    </div>

    <div id="bins-row">
        <div class="bin" data-bin="compost">
            <span class="bin-icon">🌱</span>
            <div class="bin-name">Compost</div>
            <div class="bin-sub">Food &amp; plants</div>

        <div class="bin" data-bin="recycle">

            <span class="bin-icon">🗑️</span>
            <div class="bin-name">Trash</div>
            <div class="bin-sub">Everything else</div>
        </div>
    </div>

    <span id="ghost"></span>
    <div id="toast"></div>

    <div id="end-screen">
        <div id="end-card">
            <div id="end-trophy">🏆</div>
            <h2>Game Over!</h2>
            <div id="end-score"></div>
            <div id="end-msg"></div>
            <button class="play-btn" onclick="restartGame()">Play Again! 🔄</button>
        </div>
    </div>

    <script>
        const ITEMS = [
            { emoji: '🍎', name: 'Apple Core', bin: 'compost', hint: 'Food scraps belong in compost!' },
            { emoji: '🍌', name: 'Banana Peel', bin: 'compost', hint: 'Fruit peels go to compost!' },

            { emoji: '🌰', name: 'Nut Shell', bin: 'compost', hint: 'Nut shells can be composted!' },

            { emoji: '📚', name: 'Old Magazine', bin: 'recycle', hint: 'Magazines go in recycling!' },
            { emoji: '📬', name: 'Envelope', bin: 'recycle', hint: 'Paper envelopes go in recycling!' },
            { emoji: '🧃', name: 'Juice Box', bin: 'recycle', hint: 'Juice cartons go in recycling!' },
            // --- extra trash ---
            { emoji: '🎈', name: 'Popped Balloon', bin: 'trash', hint: 'Balloons go in trash.' },
            { emoji: '🖊️', name: 'Used Pen', bin: 'trash', hint: 'Old pens go in trash.' },
            { emoji: '🪥', name: 'Old Toothbrush', bin: 'trash', hint: 'Old toothbrushes go in trash.' },
            { emoji: '🧸', name: 'Broken Toy', bin: 'trash', hint: 'Broken toys go in trash.' },
            { emoji: '🩴', name: 'Old Flip Flop', bin: 'trash', hint: 'Worn-out shoes go in trash.' },
        ];

        let queue = [], idx = 0, score = 0, canAct = true, isDragging = false;

        const card = document.getElementById('trash-card');
        const ghost = document.getElementById('ghost');
        const toast = document.getElementById('toast');
        const bins = document.querySelectorAll('.bin');
        const scoreVal = document.getElementById('score-val');
        const leftVal = document.getElementById('left-val');
        const progFill = document.getElementById('prog-fill');

        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

        function startGame() {
            queue = shuffle(ITEMS);
            idx = 0; score = 0; canAct = true; isDragging = false;
            showCard();
            updateHUD();
        }

        function showCard() {
            const it = queue[idx];
            document.getElementById('trash-emoji').textContent = it.emoji;
            document.getElementById('trash-label').textContent = it.name;
            ghost.textContent = it.emoji;
            card.style.opacity = '1';
            card.style.animation = 'none';
            void card.offsetWidth;
            card.style.animation = 'card-in 0.4s ease, card-float 3s ease-in-out 0.4s infinite';
        }

        function updateHUD() {
            scoreVal.textContent = score;
            leftVal.textContent = Math.max(0, queue.length - idx);
            progFill.style.width = (idx / queue.length * 100) + '%';
        }

        function onAnswer(bin) {
            if (!canAct) return;
            canAct = false;

            const it = queue[idx];
            const ok = bin === it.bin;
            if (ok) {
                score++;
                showToast('✅ Correct! ' + it.hint, false);
                spawnConfetti();
            } else {
                showToast('❌ Oops! ' + it.hint, true);
                shakeCard();
            }

            idx++;
            updateHUD();

            setTimeout(() => {
                hideToast();
                if (idx >= queue.length) {
                    showEnd();
                } else {
                    showCard();
                    canAct = true;
                }
            }, 2100);
        }

        function showToast(msg, wrong) {
            toast.textContent = msg;
            toast.className = 'show' + (wrong ? ' wrong' : '');
        }

        function hideToast() { toast.className = ''; }

        function shakeCard() {
            card.style.animation = 'card-shake 0.5s ease';
            setTimeout(() => { card.style.animation = 'card-float 3s ease-in-out infinite'; }, 520);
        }

        function spawnConfetti() {
            const colors = ['#ff7675', '#fdcb6e', '#6c5ce7', '#00b894', '#0984e3', '#e84393', '#55efc4'];
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'conf';
                const size = 7 + Math.random() * 11;
                el.style.cssText = `
            left:${Math.random() * 100}vw; top:-20px;
            width:${size}px; height:${size}px;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            border-radius:${Math.random() > 0.45 ? '50%' : '3px'};
            animation-duration:${1.6 + Math.random() * 2.4}s;
            animation-delay:${Math.random() * 0.7}s;
        `;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4500);
            }
        }

        function showEnd() {
            const pct = Math.round(score / queue.length * 100);
            let trophy, msg;
            if (pct === 100) { trophy = '🏆'; msg = "Perfect score! You're a recycling hero! 🌍"; }
            else if (pct >= 80) { trophy = '🌟'; msg = "Amazing job! The Earth thanks you!"; }
            else if (pct >= 60) { trophy = '👍'; msg = "Good effort! Keep practicing!"; }
            else { trophy = '🌱'; msg = "Keep learning — you'll get it next time!"; }

            document.getElementById('end-trophy').textContent = trophy;
            document.getElementById('end-score').textContent = `${score} / ${queue.length} (${pct}%)`;
            document.getElementById('end-msg').textContent = msg;
            document.getElementById('end-screen').classList.add('active');
            spawnConfetti();
        }

        function restartGame() {
            document.getElementById('end-screen').classList.remove('active');
            startGame();
        }

        // ── Desktop Drag & Drop ──────────────────────────────────────────────────────

        card.addEventListener('dragstart', e => {
            if (!canAct) { e.preventDefault(); return; }
            isDragging = true;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => {
                card.style.opacity = '0.25';
                card.classList.add('grabbing');
            }, 0);
        });

        card.addEventListener('dragend', () => {
            isDragging = false;
            card.style.opacity = '1';
            card.classList.remove('grabbing');
            bins.forEach(b => b.classList.remove('over'));
        });

        bins.forEach(bin => {
            bin.addEventListener('dragover', e => { e.preventDefault(); bin.classList.add('over'); });
            bin.addEventListener('dragleave', () => bin.classList.remove('over'));
            bin.addEventListener('drop', e => {
                e.preventDefault();
                bins.forEach(b => b.classList.remove('over'));
                if (isDragging) onAnswer(bin.dataset.bin);
            });
        });

        // ── Touch Drag ───────────────────────────────────────────────────────────────

        let touchBin = null;

        card.addEventListener('touchstart', e => {
            if (!canAct) return;
            const t = e.touches[0];
            ghost.style.left = t.clientX + 'px';
            ghost.style.top = t.clientY + 'px';
            ghost.style.display = 'block';
            card.style.opacity = '0.25';
            card.classList.add('grabbing');
            e.preventDefault();
        }, { passive: false });

        card.addEventListener('touchmove', e => {
            const t = e.touches[0];
            ghost.style.left = t.clientX + 'px';
            ghost.style.top = t.clientY + 'px';

            ghost.style.display = 'none';
            const el = document.elementFromPoint(t.clientX, t.clientY);
            ghost.style.display = 'block';

            bins.forEach(b => b.classList.remove('over'));
            touchBin = el?.closest('.bin') ?? null;
            if (touchBin) touchBin.classList.add('over');

            e.preventDefault();
        }, { passive: false });

        card.addEventListener('touchend', e => {
            ghost.style.display = 'none';
            card.style.opacity = '1';
            card.classList.remove('grabbing');
            bins.forEach(b => b.classList.remove('over'));
            if (touchBin) { onAnswer(touchBin.dataset.bin); touchBin = null; }
            e.preventDefault();
        }, { passive: false });

        // ── Click-to-sort (keyboard / accessibility) ─────────────────────────────────

        bins.forEach(bin => {
            bin.addEventListener('click', () => {
                if (!isDragging) onAnswer(bin.dataset.bin);
            });
        });

        startGame();
    </script>
</body>

</html>
